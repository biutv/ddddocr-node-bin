name: Build/release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - mac
          - linux
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJSON(
          github.event_name == 'push' && '["macos-latest", "windows-latest", "windows-11-arm", "ubuntu-latest"]' ||
          github.event_name == 'pull_request_target' && '["macos-latest", "windows-latest", "windows-11-arm", "ubuntu-latest"]' ||
          github.event.inputs.platform == 'all' && '["macos-latest", "windows-latest", "windows-11-arm", "ubuntu-latest"]' ||
          github.event.inputs.platform == 'linux' && '["ubuntu-latest"]' ||
          github.event.inputs.platform == 'windows' && '["windows-latest", "windows-11-arm"]' ||
          github.event.inputs.platform == 'mac' && '["macos-latest"]' ||
          '["macos-latest", "windows-latest", "ubuntu-latest"]'
          ) }}
      fail-fast: false

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: Get release tag
        id: get-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request_target" ]; then
            # Extract version from branch name (release/v1.0.0 -> v1.0.0)
            BRANCH="${{ github.event.pull_request.head.ref }}"
            echo "tag=${BRANCH#release/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.os == 'ubuntu-latest' && '20' || '24' }}

      - name: Install dependencies
        run: npm install
      
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          rm -rf ./node_modules/onnxruntime-node/bin/napi-v3/{darwin,win32}
          npm run build:linux

      - name: Build Mac
        if: matrix.os == 'macos-latest'
        run: |
          rm -rf ./node_modules/onnxruntime-node/bin/napi-v3/{linux,win32}
          npm run build:mac

      - name: Build Windows x64
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          rm -rf ./node_modules/onnxruntime-node/bin/napi-v3/{darwin,linux}
          rm -rf ./node_modules/onnxruntime-node/bin/napi-v3/win32/arm64
          npm run build:win:x64

      - name: Build Windows arm64
        if: matrix.os == 'windows-11-arm'
        shell: bash
        run: |
          rm -rf ./node_modules/onnxruntime-node/bin/napi-v3/{darwin,linux}
          rm -rf ./node_modules/onnxruntime-node/bin/napi-v3/win32/x64
          npm run build:win:arm64

      - name: List files to be uploaded
        shell: bash
        run: |
          echo "准备上传的文件:"
          if [ -x "$(command -v tree)" ]; then
            tree dist
          elif [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist
          fi
          echo "总计: $(find dist -type f | wc -l) 个文件"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ocr-bin-${{ matrix.os }}
          path: dist/*
          retention-days: 3
          compression-level: 8

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          makeLatest: false
          tag: ${{ steps.get-tag.outputs.tag }}
          artifacts: 'dist/*'
          token: ${{ secrets.GITHUB_TOKEN }}